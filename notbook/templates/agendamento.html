<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.9.2/dist/umd/popper.min.js" integrity="sha384-IQsoLXl5PILFhosVNubq5LC7Qb9DXgDA9i+tQ8Zj3iwWAwPtgFTxbJ8NT4GN1R8p" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.min.js" integrity="sha384-cVKIPhGWiC2Al4u+LWgxfKTRIcfu0JTxR+EQDz/bgldoEyl4H0zUF0QKbrJ0EcQF" crossorigin="anonymous"></script>
<script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
<script nomodule src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"></script>
    <title>Agendamento de notbook</title>
    {% if confirma %}
    <div class="alert alert-success" role="alert">
  confirmado
</div>
    {% endif %}
    <style>
        body {
            font-family: 'Arial', sans-serif;
            background-color: #f4f7f9;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            display: flex;
            flex-direction: row;
            flex-wrap: wrap;
            justify-content: flex-start;
        }

        .calendar {
            background-color: #ffffff;
            border-radius: 12px;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.1);
            padding: 20px;
            width: 1000px;
            text-align: center;
            height: 890px;
        }
        .form{
            background-color: #ffffff;
            border-radius: 12px;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.1);
            text-align: center;
            padding: 20px;
            margin: 50px;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .header button {
            background: none;
            border: none;
            font-size: 1.8rem;
            cursor: pointer;
            color: #333;
            transition: color 0.3s;
        }

        .header button:hover {
            color: #007bff;
        }

        .header h2 {
            font-size: 1.5rem;
            color: #333;
            margin: 0;
        }

        .weekdays {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 10px;
            font-weight: bold;
            color: #777;
            margin-bottom: 10px;
        }

        .days {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 10px;
        }

        .day {
            padding: 10px 0;
            border-radius: 8px;
            cursor: pointer;
            border: 1px solid black;
            transition: background-color 0.3s, color 0.3s;
            height: fit-content;
            min-height: 120px;
        }

        .day:hover {
            background-color: #e9e9e9;
        }

        .day.today {
            background-color: #007bff;
            color: #ffffff;
            font-weight: bold;
        }

        .day.other-month {
            color: #ccc;
        }
        .calendar-dates .event-label {
            display: block; 
            font-size: 0.8em;
            color: #555;
            margin-top: 5px;
        }
        .event-label {
            display: inline-flex;
            flex-direction: column;
            background-color: #ef8544;
        }
        .event-label:hover {
            display: inline-flex;
            flex-direction: column;
            background-color: #ef8644af;
        }
    </style>
</head>
<body>
<div class="form">
<h1><ion-icon name="desktop-outline"></ion-icon> <BR> NOT-APEMA</h1>
<form action="{{url_for("agenda")}}" method="post" enctype="multipart/form-data" >
<div class="input-group mb-3">
  <span class="input-group-text" id="basic-addon1">@</span>
  <input type="text" class="form-control" id="username" name="username" placeholder="Nome de Usuario" aria-label="Username" aria-describedby="basic-addon1" required>
</div>
<div class="input-group mb-3">
  <span class="input-group-text" id="basic-addon1">Titulo</span>
  <input type="text" class="form-control" id="titulo" name="titulo" placeholder="Nome da reunião"  aria-describedby="basic-addon1" required>
</div>
<div class="input-group mb-3">
  <span class="input-group-text" id="basic-addon1">Sala</span>
  <select class="form-select" aria-label="Default select example" id="sala" name="sala" aria-describedby="basic-addon1" required>
  <option selected value="">Local da reunião</option>
  <option >Sala de treinamentos</option>
  <option >Sala de reuniao 1° andar</option>
  <option >Sala de reuniao 2° andar</option>
  <option >Antigo RH</option>
  <option >Na mesa</option>


</select>
</div>
<div class="input-group mb-3">
  <label class="input-group-text" for="date">Data</label>
  <input type="date" class="form-control" id="data" name="data" required>
</div>
<div class="input-group mb-3">
  <label class="input-group-text" for="hora">Hora</label>
  <input type="time" class="form-control" id="hora" name="hora" required>
</div>
<div class="input-group mb-3">
  <label class="input-group-text" for="arquivo">Upload</label>
  <input type="file" class="form-control" id="arquivo" name="arquivo">
</div>
<div class="input-group mb-3">
  <span class="input-group-text" id="link">https://</span>
  <input type="text" class="form-control" id="link" name="link" aria-describedby="basic-addon3">
</div>
<button class="btn btn-primary" type="submit" style="width: 100%;"><ion-icon name="add-outline"></ion-icon> AGENDAR </button>
</form>
</div>
    <div class="calendar">
        <div class="header">
            <button id="prev-btn">&lt;</button>
            <h2 id="current-month-year"></h2>
            <button id="next-btn">&gt;</button>
        </div>

        <div class="weekdays">
            <div>Dom</div>
            <div>Seg</div>
            <div>Ter</div>
            <div>Qua</div>
            <div>Qui</div>
            <div>Sex</div>
            <div>Sáb</div>
        </div>

        <div class="days" id="calendar-days" style="height: 700px;">
            </div>
    </div>

    <script>
        const events = {{ datas | tojson }};
        const calendarDays = document.getElementById('calendar-days');
        const currentMonthYear = document.getElementById('current-month-year');
        const prevBtn = document.getElementById('prev-btn');
        const nextBtn = document.getElementById('next-btn');

        let date = new Date();
        let currentYear = date.getFullYear();
        let currentMonth = date.getMonth();

        const months = [
            'Janeiro', 'Fevereiro', 'Março', 'Abril', 'Maio', 'Junho',
            'Julho', 'Agosto', 'Setembro', 'Outubro', 'Novembro', 'Dezembro'
        ];

        function renderCalendar() {
            calendarDays.innerHTML = ''; // Limpa o conteúdo anterior
            const firstDay = new Date(currentYear, currentMonth, 1).getDay(); // Pega o dia da semana do primeiro dia do mês (0=Dom, 1=Seg, etc.)
            const lastDay = new Date(currentYear, currentMonth + 1, 0).getDate(); // Pega o último dia do mês atual

            // Preenche os dias "vazios" do mês anterior
            for (let i = 0; i < firstDay; i++) {
                const day = document.createElement('div');
                day.classList.add('day', 'other-month');
                calendarDays.appendChild(day);
            }

            // Preenche os dias do mês atual
            for (let i = 1; i <= lastDay; i++) {
                const day = document.createElement('div');
                day.classList.add('day');
                
                // Cria o elemento para o número do dia e o adiciona
                const dayNumber = document.createElement('span');
                dayNumber.classList.add('day-number');
                dayNumber.textContent = i;
                day.appendChild(dayNumber);
                
                // Formata o dia atual para comparação
                // Destaca o dia atual
                if (i === date.getDate() && currentMonth === new Date().getMonth() && currentYear === new Date().getFullYear()) {
                    day.classList.add('today');
                }

                // Formata a data para a busca
                const formattedDate = `${currentYear}-${String(currentMonth + 1).padStart(2, '0')}-${String(i).padStart(2, '0')}`;
                
                // Verifica se há eventos para esta data
                const labelsForThisDay = events[formattedDate];

                if (labelsForThisDay) {
                    day.classList.add('event-day');
                    
                    // Itera sobre todos os rótulos e os adiciona ao dia
                    labelsForThisDay.forEach(label_text => {
                        const label = document.createElement('span');
                        label.classList.add('event-label');
                        label.textContent = label_text;
                        day.appendChild(label);
                    });
                }


                calendarDays.appendChild(day);
            }
            currentMonthYear.textContent = `${months[currentMonth]} ${currentYear}`;
        }

        prevBtn.addEventListener('click', () => {
            currentMonth--;
            if (currentMonth < 0) {
                currentMonth = 11;
                currentYear--;
            }
            renderCalendar();
        });

        nextBtn.addEventListener('click', () => {
            currentMonth++;
            if (currentMonth > 11) {
                currentMonth = 0;
                currentYear++;
            }
            renderCalendar();
        });

        renderCalendar();
    </script>

</body>
</html>
