<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.9.2/dist/umd/popper.min.js" integrity="sha384-IQsoLXl5PILFhosVNubq5LC7Qb9DXgDA9i+tQ8Zj3iwWAwPtgFTxbJ8NT4GN1R8p" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.min.js" integrity="sha384-cVKIPhGWiC2Al4u+LWgxfKTRIcfu0JTxR+EQDz/bgldoEyl4H0zUF0QKbrJ0EcQF" crossorigin="anonymous"></script>
<script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
<script nomodule src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"></script>
    <title>Reunioes</title>
</head>
<style>
    .form{
            background-color: #ffffff;
            border-radius: 12px;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.1);
            text-align: center;
            padding: 20px;
            margin: 50px;
        }

</style>
<body>
<nav class="navbar navbar-expand-lg navbar-light bg-light">
  <div class="container-fluid">
    <a class="navbar-brand" href="{{url_for("reunioes")}}">
      <img src="../static/img/logotipo_apema.png" alt="Logo" width="30" height="24" class="d-inline-block align-text-top">
      NOT-APEMA
    </a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent" aria-expanded="false" aria-label="Toggle navigation">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navbarSupportedContent">
      <ul class="navbar-nav me-auto mb-2 mb-lg-0">
        <li class="nav-item">
          <a class="nav-link active" aria-current="page" href="{{url_for("reunioes")}}">AGENDA</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" href="{{url_for("concluidas")}}">REUNIOES CONCLUIDAS</a>
        </li>
      </ul>
    </div>
  </div>
</nav>

{%  for data in datas %}
<div class="form">
<form action="{{url_for("edit_reuniao", id=data.id)}}" method="post">
    <h1><ion-icon name="desktop-outline"></ion-icon> EDIT-REUNIAO</h1>
<div class="input-group mb-3">
  <span class="input-group-text" id="basic-addon1">@</span>
  <input type="text" class="form-control" id="username" name="username" placeholder="Nome de Usuario" aria-label="Username" value="{{data.usuario}}" aria-describedby="basic-addon1" required>
</div>
<div class="input-group mb-3">
  <span class="input-group-text" id="basic-addon1">Titulo</span>
  <input type="text" class="form-control" id="titulo" name="titulo" placeholder="Nome da reunião" value="{{data.reuniao}}" aria-describedby="basic-addon1" required>
</div>
<div class="input-group mb-3">
  <span class="input-group-text" id="basic-addon1">Sala</span>
  <select class="form-select" aria-label="Default select example" id="sala" name="sala" aria-describedby="basic-addon1" required>
  <option selected >{{data.sala}}</option>
  <option >Sala de treinamentos</option>
  <option >Sala de reuniao 1° andar</option>
  <option >Sala de reuniao 2° andar</option>
  <option >Antigo RH</option>
  <option >Na mesa</option>


</select>
</div>
<div class="input-group mb-3">
  <label class="input-group-text" for="date">Data</label>
  <input type="date" class="form-control" id="data" name="data" value="{{data.data}}" required>
</div>
<div class="input-group mb-3">
  <label class="input-group-text" for="hora">Hora</label>
  <input type="time" class="form-control" id="hora" name="hora" value="{{data.hora}}" required>
</div>
<div class="input-group mb-3">
  <label class="input-group-text" for="arquivo">Upload</label>
  <input type="file" class="form-control" id="arquivo" name="arquivo">
</div>
<div class="input-group mb-3">
  <span class="input-group-text" id="link">https://</span>
  <input type="text" class="form-control" id="link" name="link" value="{{data.link}}" aria-describedby="basic-addon3">
</div>
<button class="btn btn-success" type="submit" style="width: 100%;"> EDITAR </button>
</form>
{% endfor %}
</body>
</html>
